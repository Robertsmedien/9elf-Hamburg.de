<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>CMS Dashboard — 9ELF Hamburg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#B51721;--red-bright:#D81E2A;--red-dark:#8E121A;--bg:#0d0d0e;--panel:#161618;--panel-2:#1d1d20;--line:rgba(255,255,255,.08);--txt:#f2f2f2;--muted:#9a9a9f;--muted-2:#6e6e73;--ok:#3ba55c;--warn:#d9a441;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:9px;height:9px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:#2a2a2e;border-radius:5px;}::-webkit-scrollbar-thumb:hover{background:var(--red);}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;}

/* ---------- LOGIN ---------- */
.login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 80% 80% at 50% 0%,rgba(181,23,33,.12),transparent 60%),var(--bg);z-index:50;}
.login-card{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:44px 38px;box-shadow:0 30px 80px rgba(0,0,0,.55);}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:34px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.login-logo span{color:var(--red);}
.login-sub{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:34px;}
.field{margin-bottom:18px;}
.field label{display:block;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.field input,.field textarea,.field select{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:13px 15px;color:var(--txt);font-size:15px;transition:border-color .2s,box-shadow .2s;}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(181,23,33,.15);}
.field textarea{resize:vertical;min-height:90px;line-height:1.5;}
.btn{font-family:'Oswald',sans-serif;font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;background:var(--red);color:#fff;padding:14px 26px;border-radius:9px;transition:.25s;display:inline-flex;align-items:center;justify-content:center;gap:9px;}
.btn:hover{background:var(--red-bright);transform:translateY(-1px);}
.btn.block{width:100%;}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt);}
.btn.ghost:hover{border-color:var(--red);background:rgba(181,23,33,.08);transform:none;}
.btn.sm{padding:8px 15px;font-size:11px;border-radius:7px;}
.btn.danger{background:transparent;border:1px solid rgba(217,68,68,.4);color:#e77;}
.btn.danger:hover{background:rgba(217,68,68,.12);border-color:#e77;}
.login-note{margin-top:22px;font-size:13px;color:var(--muted-2);text-align:center;line-height:1.6;}
.login-note b{color:var(--muted);}

/* ---------- APP LAYOUT ---------- */
.app{display:none;min-height:100vh;}
.app.on{display:grid;grid-template-columns:250px 1fr;}
.sidebar{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.sb-brand{padding:26px 24px 22px;border-bottom:1px solid var(--line);}
.sb-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;letter-spacing:1px;text-transform:uppercase;line-height:1;}
.sb-logo span{color:var(--red);}
.sb-tag{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted-2);margin-top:5px;}
.sb-nav{flex:1;padding:16px 14px;overflow-y:auto;}
.sb-cat{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted-2);padding:14px 12px 8px;}
.sb-item{display:flex;align-items:center;gap:13px;width:100%;padding:11px 12px;border-radius:9px;font-size:14.5px;color:var(--muted);transition:.18s;text-align:left;}
.sb-item .ic{width:18px;height:18px;flex-shrink:0;opacity:.85;}
.sb-item:hover{background:var(--panel-2);color:var(--txt);}
.sb-item.active{background:linear-gradient(90deg,rgba(181,23,33,.18),rgba(181,23,33,.04));color:#fff;box-shadow:inset 3px 0 0 var(--red);}
.sb-item .badge{margin-left:auto;font-family:'Oswald',sans-serif;font-size:11px;background:var(--panel-2);color:var(--muted);border-radius:20px;padding:2px 9px;}
.sb-item.active .badge{background:rgba(181,23,33,.25);color:#fff;}
.sb-foot{padding:14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px;}

.main{min-width:0;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;gap:20px;padding:20px 32px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(13,13,14,.82);backdrop-filter:blur(14px);z-index:10;}
.topbar h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:28px;letter-spacing:.5px;text-transform:uppercase;line-height:1;}
.topbar .sub{font-size:13px;color:var(--muted);margin-top:3px;}
.topbar .spacer{flex:1;}
.tb-search{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 14px;color:var(--txt);font-size:14px;width:230px;max-width:34vw;}
.tb-search:focus{outline:none;border-color:var(--red);}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-dark));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;flex-shrink:0;}
.content{padding:32px;max-width:1200px;width:100%;}

/* stats */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:30px;}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;position:relative;overflow:hidden;transition:border-color .3s,transform .3s;}
.stat:hover{border-color:rgba(181,23,33,.4);transform:translateY(-3px);}
.stat .st-ic{font-size:24px;margin-bottom:14px;}
.stat .st-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:40px;line-height:1;}
.stat .st-lab{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:8px;}
.stat .st-trend{position:absolute;top:22px;right:22px;font-size:12px;font-family:'Oswald',sans-serif;letter-spacing:1px;color:var(--ok);}

.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px 26px;}
.card h3{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:20px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.act{display:flex;align-items:flex-start;gap:14px;padding:13px 0;border-bottom:1px solid var(--line);}
.act:last-child{border-bottom:none;}
.act .dot{width:9px;height:9px;border-radius:50%;background:var(--red);margin-top:6px;flex-shrink:0;}
.act .at{font-size:14.5px;}
.act .am{font-size:12.5px;color:var(--muted-2);margin-top:2px;}
.quick{display:flex;flex-direction:column;gap:10px;}
.quick button{justify-content:flex-start;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;color:var(--txt);font-size:14.5px;display:flex;align-items:center;gap:12px;transition:.2s;}
.quick button:hover{border-color:var(--red);background:rgba(181,23,33,.08);}

/* section header + table */
.sec-head{display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.sec-head .desc{color:var(--muted);font-size:14.5px;flex:1;min-width:200px;}
.tbl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{text-align:left;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted-2);padding:15px 20px;border-bottom:1px solid var(--line);white-space:nowrap;}
tbody td{padding:15px 20px;border-bottom:1px solid var(--line);font-size:14.5px;vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .15s;}
tbody tr:hover{background:var(--panel-2);}
.cell-title{font-weight:500;}
.cell-sub{font-size:12.5px;color:var(--muted-2);margin-top:2px;}
.thumb{width:46px;height:46px;border-radius:8px;background:linear-gradient(135deg,#26262a,#161618);display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid var(--line);}
.pill{font-family:'Oswald',sans-serif;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;padding:4px 11px;border-radius:20px;display:inline-block;}
.pill.on{background:rgba(59,165,92,.15);color:#5fca82;}
.pill.off{background:rgba(110,110,115,.15);color:var(--muted);}
.pill.res{background:rgba(217,164,65,.15);color:#e0b45f;}
.pill.cat{background:rgba(181,23,33,.15);color:#e06b73;}
.row-actions{display:flex;gap:8px;justify-content:flex-end;}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.18s;}
.icon-btn:hover{border-color:var(--red);color:#fff;background:rgba(181,23,33,.1);}
.icon-btn.del:hover{border-color:#e77;color:#e77;background:rgba(217,68,68,.1);}
.icon-btn svg{width:16px;height:16px;}
.empty{padding:50px 20px;text-align:center;color:var(--muted-2);}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:24px;z-index:60;}
.modal-bg.on{display:flex;}
.modal{width:100%;max-width:560px;background:var(--panel);border:1px solid var(--line);border-radius:16px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6);}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 26px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);}
.modal-head h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;text-transform:uppercase;letter-spacing:.5px;}
.modal-body{padding:26px;}
.modal-foot{padding:18px 26px;border-top:1px solid var(--line);display:flex;gap:12px;justify-content:flex-end;position:sticky;bottom:0;background:var(--panel);}
.x-btn{width:34px;height:34px;border-radius:8px;color:var(--muted);font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;transition:.18s;}
.x-btn:hover{background:var(--panel-2);color:#fff;}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel-2);border:1px solid var(--line);border-left:3px solid var(--ok);border-radius:10px;padding:14px 22px;font-size:14.5px;box-shadow:0 20px 50px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.3s;z-index:80;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.demo-banner{background:rgba(217,164,65,.1);border:1px solid rgba(217,164,65,.28);color:#e0b45f;border-radius:12px;padding:13px 18px;font-size:13.5px;margin-bottom:26px;display:flex;align-items:center;gap:10px;}

@media(max-width:900px){.app.on{grid-template-columns:1fr;}.sidebar{position:fixed;left:-260px;z-index:40;transition:left .3s;}.sidebar.open{left:0;}.stat-grid{grid-template-columns:1fr 1fr;}.grid-2{grid-template-columns:1fr;}.menu-btn{display:flex!important;}}
.menu-btn{display:none;width:40px;height:40px;border-radius:9px;border:1px solid var(--line);align-items:center;justify-content:center;}
@media(max-width:560px){.stat-grid{grid-template-columns:1fr;}.form-row2{grid-template-columns:1fr;}.content{padding:20px;}.topbar{padding:16px 18px;}.tb-search{display:none;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login">
  <div class="login-card">
    <div class="login-logo">9<span>ELF</span> CMS</div>
    <div class="login-sub">Content Management · Hamburg</div>
    <div class="field"><label>Benutzername</label><input id="lu" type="text" value="admin" autocomplete="username"></div>
    <div class="field"><label>Passwort</label><input id="lp" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn block" onclick="doLogin()">Anmelden</button>
    <div class="login-note"><b>Demo-Zugang.</b> Beliebige Eingabe genügt.<br>Änderungen werden nur lokal im Browser gespeichert.</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">9<span>ELF</span></div>
      <div class="sb-tag">Dashboard</div>
    </div>
    <nav class="sb-nav" id="sbnav"></nav>
    <div class="sb-foot">
      <a class="btn ghost sm" href="index.html" target="_blank" style="justify-content:center;">Zur Website ↗</a>
      <button class="btn ghost sm" onclick="doLogout()" style="justify-content:center;">Abmelden</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Menü">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div>
        <h1 id="pgTitle">Übersicht</h1>
        <div class="sub" id="pgSub">Willkommen zurück</div>
      </div>
      <div class="spacer"></div>
      <input class="tb-search" type="text" placeholder="Suchen…" id="search" oninput="renderCurrent()">
      <div class="avatar">DN</div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head"><h3 id="modalTitle">Bearbeiten</h3><button class="x-btn" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn" onclick="saveModal()">Speichern</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ DATA MODEL ============ */
const STORE_KEY = '9elf_cms_v1';

// Section schemas: fields drive both the table and the edit form
const SECTIONS = {
  dashboard: { label:'Übersicht', icon:grid() },
  magazin: {
    label:'Magazin', icon:doc(), badgeFrom:'magazin',
    columns:[
      {key:'title', head:'Titel', type:'title', thumbKey:'emoji'},
      {key:'category', head:'Kategorie', type:'cat'},
      {key:'date', head:'Datum'},
      {key:'readtime', head:'Lesezeit', suffix:' Min'},
      {key:'status', head:'Status', type:'status'},
    ],
    fields:[
      {key:'title', label:'Titel', type:'text'},
      {key:'category', label:'Kategorie', type:'select', options:['Projekt','Technik','Service','Event']},
      {key:'excerpt', label:'Auszug', type:'textarea'},
      {key:'date', label:'Datum', type:'text', ph:'z.B. 28. März 2026'},
      {key:'readtime', label:'Lesezeit (Min)', type:'number'},
      {key:'emoji', label:'Icon / Emoji', type:'text', ph:'🔧'},
      {key:'status', label:'Status', type:'select', options:['Veröffentlicht','Entwurf']},
    ]
  },
  galerie: {
    label:'Galerie', icon:image(),
    columns:[
      {key:'title', head:'Bild', type:'title', thumbKey:'emoji'},
      {key:'category', head:'Kategorie', type:'cat'},
      {key:'status', head:'Status', type:'status'},
    ],
    fields:[
      {key:'title', label:'Bezeichnung', type:'text'},
      {key:'category', label:'Kategorie', type:'select', options:['Motor','Detail','Werkstatt','Prüfstand','Event']},
      {key:'emoji', label:'Icon / Emoji', type:'text', ph:'📷'},
      {key:'status', label:'Status', type:'select', options:['Veröffentlicht','Entwurf']},
    ]
  },
  fahrzeuge: {
    label:'Fahrzeuge', icon:car(),
    columns:[
      {key:'title', head:'Modell', type:'title', thumbKey:'emoji'},

      {key:'price', head:'Preis'},
      {key:'state', head:'Status', type:'state'},
    ],
    fields:[
      {key:'title', label:'Modell', type:'text', ph:'Porsche 993 Carrera'},
      {key:'year', label:'Baujahr', type:'text'},
      {key:'specs', label:'Eckdaten', type:'text', ph:'89.000 km · 285 PS · Schaltgetriebe'},
      {key:'price', label:'Preis', type:'text', ph:'auf Anfrage'},
      {key:'emoji', label:'Icon / Emoji', type:'text', ph:'🏎️'},
      {key:'state', label:'Status', type:'select', options:['Verfügbar','Reserviert','Verkauft']},
    ]
  },
  team: {
    label:'Team', icon:people(),
    columns:[
      {key:'name', head:'Name', type:'title', thumbKey:'initials'},
      {key:'role', head:'Rolle', type:'cat'},
      {key:'status', head:'Status', type:'status'},
    ],
    fields:[
      {key:'name', label:'Name', type:'text'},
      {key:'initials', label:'Initialen', type:'text', ph:'DN'},
      {key:'role', label:'Rolle', type:'text', ph:'Kfz-Meister & Werkstatt'},
      {key:'bio', label:'Kurzbio', type:'textarea'},
      {key:'status', label:'Status', type:'select', options:['Aktiv','Inaktiv']},
    ]
  },
  shop: {
    label:'Shop', icon:bag(),
    columns:[
      {key:'title', head:'Produkt', type:'title', thumbKey:'emoji'},
      {key:'category', head:'Kategorie', type:'cat'},
      {key:'price', head:'Preis'},
      {key:'status', head:'Status', type:'status'},
    ],
    fields:[
      {key:'title', label:'Produktname', type:'text'},
      {key:'category', label:'Kategorie', type:'select', options:['T-Shirts','Caps','Hoodies','Aufkleber','Modelle','Pins']},
      {key:'description', label:'Beschreibung', type:'textarea'},
      {key:'price', label:'Preis', type:'text', ph:'34,90 €'},
      {key:'emoji', label:'Icon / Emoji', type:'text', ph:'🛍️'},
      {key:'status', label:'Status', type:'select', options:['Aktiv','Ausverkauft']},
    ]
  },
};

const SECTION_ORDER = ['magazin','galerie','fahrzeuge','team','shop'];

function seed(){
  return {
    magazin:[
      {id:id(),title:'Die Kultschrauber',category:'Projekt',excerpt:'Ein extrem seltener Carrera 3.0 kam zu uns, begleitet von Spiegel TV.',date:'28. März 2026',readtime:6,emoji:'🎬',status:'Veröffentlicht'},
      {id:id(),title:'F-Modell Motor-Teardown',category:'Technik',excerpt:'Schritt für Schritt durch den kompletten Motorausbau eines klassischen F-Modells.',date:'14. Feb 2026',readtime:5,emoji:'⚙️',status:'Veröffentlicht'},

      {id:id(),title:'9elf beim Hamburger Stadtpark Revival',category:'Event',excerpt:'Unser Tag beim Klassiker-Treffen, mit einigen unserer schönsten Kundenfahrzeuge.',date:'20. Jan 2026',readtime:3,emoji:'🏁',status:'Entwurf'},
    ],
    galerie:[

      {id:id(),title:'Fahrwerk-Setup',category:'Prüfstand',emoji:'🏁',status:'Veröffentlicht'},
      {id:id(),title:'Interieur Detail',category:'Detail',emoji:'✨',status:'Entwurf'},
    ],
    fahrzeuge:[
      {id:id(),title:'Porsche 993 Carrera',year:'1997',specs:'89.000 km · 285 PS · Schaltgetriebe',price:'auf Anfrage',emoji:'🏎️',state:'Verfügbar'},
      {id:id(),title:'Porsche 964 Carrera 4',year:'1990',specs:'112.000 km · 250 PS · Schaltgetriebe',price:'auf Anfrage',emoji:'🚗',state:'Reserviert'},
      {id:id(),title:'Porsche 911 Targa 4S',year:'2016',specs:'54.000 km · 400 PS · PDK',price:'auf Anfrage',emoji:'🏎️',state:'Verfügbar'},
    ],
    team:[
      {id:id(),name:'Dennis Neumann',initials:'DN',role:'Gründer & Geschäftsführer',bio:'Über 25 Jahre Porsche Erfahrung im Niederlassungsbetrieb.',status:'Aktiv'},
      {id:id(),name:'Andreas Irmler',initials:'AI',role:'Kfz-Meister & Fahrzeugverkauf',bio:'Als Werkstattleiter das Herzstück unserer Werkstatt.',status:'Aktiv'},
      {id:id(),name:'Jörg Kassel',initials:'JK',role:'Kfz-Meister & Werkstatt',bio:'Seine Leidenschaft gilt dem Motorsport und der Feinabstimmung.',status:'Aktiv'},

/* ============ STATE ============ */
let DB = load();
let current = 'dashboard';
let editing = null; // {section, id|null}

function load(){
  try{ const raw=localStorage.getItem(STORE_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  const s=seed(); persist(s); return s;
}
function persist(d){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(d||DB)); }catch(e){} }
function id(){ return 'x'+Math.random().toString(36).slice(2,9); }

/* ============ AUTH ============ */
function doLogin(){
  sessionStorage.setItem('9elf_cms_auth','1');
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('on');
  buildSidebar(); go('dashboard');
}
function doLogout(){ sessionStorage.removeItem('9elf_cms_auth'); location.reload(); }
if(sessionStorage.getItem('9elf_cms_auth')==='1'){
  window.addEventListener('DOMContentLoaded',()=>{ doLogin(); });
}
document.getElementById('lp').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

/* ============ SIDEBAR ============ */
function buildSidebar(){
  const nav=document.getElementById('sbnav');
  let html = `<button class="sb-item" data-s="dashboard" onclick="go('dashboard')">${SECTIONS.dashboard.icon}<span>Übersicht</span></button>`;
  html += `<div class="sb-cat">Inhalte</div>`;
  SECTION_ORDER.forEach(s=>{
    const c = (DB[s]||[]).length;
    html += `<button class="sb-item" data-s="${s}" onclick="go('${s}')">${SECTIONS[s].icon}<span>${SECTIONS[s].label}</span><span class="badge">${c}</span></button>`;
  });
  html += `<div class="sb-cat">System</div>`;
  html += `<button class="sb-item" data-s="settings" onclick="go('settings')">${gear()}<span>Einstellungen</span></button>`;
  nav.innerHTML=html;
}
function setActive(){ document.querySelectorAll('.sb-item').forEach(b=>b.classList.toggle('active', b.dataset.s===current)); }

/* ============ ROUTER ============ */
function go(section){
  current=section;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('search').value='';
  setActive();
  renderCurrent();
}
function renderCurrent(){
  const t=document.getElementById('pgTitle'), sub=document.getElementById('pgSub'), c=document.getElementById('content');
  if(current==='dashboard'){ t.textContent='Übersicht'; sub.textContent='Willkommen zurück, Dennis'; c.innerHTML=renderDashboard(); return; }
  if(current==='settings'){ t.textContent='Einstellungen'; sub.textContent='Konto & Daten'; c.innerHTML=renderSettings(); return; }
  const sec=SECTIONS[current];
  t.textContent=sec.label; sub.textContent=(DB[current]||[]).length+' Einträge';
  c.innerHTML=renderTable(current);
}

/* ============ DASHBOARD ============ */
function renderDashboard(){
  const counts=SECTION_ORDER.map(s=>({s,n:(DB[s]||[]).length}));
  const stats=[
    {ic:'📝',n:DB.magazin.length,l:'Beiträge',tr:'Magazin'},
    {ic:'🖼️',n:DB.galerie.length,l:'Galerie-Bilder',tr:'Galerie'},
    {ic:'🏎️',n:DB.fahrzeuge.length,l:'Fahrzeuge',tr:'Bestand'},
    {ic:'👥',n:DB.team.length,l:'Team-Mitglieder',tr:'Team'},
  ];
  const statHtml=stats.map(s=>`<div class="stat"><div class="st-trend">${s.tr}</div><div class="st-ic">${s.ic}</div><div class="st-num">${s.n}</div><div class="st-lab">${s.l}</div></div>`).join('');
  const acts=[
    ['Neuer Magazin-Beitrag veröffentlicht','„Die Kultschrauber" · vor 2 Stunden'],
    ['Fahrzeug-Status geändert','964 Carrera 4 → Reserviert · gestern'],
    ['Galerie aktualisiert','3 neue Bilder hinzugefügt · vor 3 Tagen'],
    ['Shop-Produkt bearbeitet','9elf Werkstatt Hoodie · vor 5 Tagen'],
  ].map(a=>`<div class="act"><div class="dot"></div><div><div class="at">${a[0]}</div><div class="am">${a[1]}</div></div></div>`).join('');
  const quick=SECTION_ORDER.map(s=>`<button onclick="openCreate('${s}')">${SECTIONS[s].icon}<span>Neu: ${SECTIONS[s].label}</span></button>`).join('');
  return `
  <div class="demo-banner">⚠️ Demo-Modus — alle Änderungen werden lokal im Browser gespeichert, nicht auf dem Server.</div>
  <div class="stat-grid">${statHtml}</div>
  <div class="grid-2">
    <div class="card"><h3>Letzte Aktivität</h3>${acts}</div>
    <div class="card"><h3>Schnellaktionen</h3><div class="quick">${quick}</div></div>
  </div>`;
}

/* ============ TABLE ============ */
function renderTable(section){
  const sec=SECTIONS[section];
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  let rows=(DB[section]||[]);
  if(q) rows=rows.filter(r=>JSON.stringify(r).toLowerCase().includes(q));
  const ths=sec.columns.map(c=>`<th>${c.head}</th>`).join('')+'<th style="text-align:right;">Aktionen</th>';
  let body;
  if(rows.length===0){
    body=`<tr><td colspan="${sec.columns.length+1}"><div class="empty">${q?'Keine Treffer.':'Noch keine Einträge. Klick auf „Neu" um zu starten.'}</div></td></tr>`;
  }else{
    body=rows.map(r=>{
      const tds=sec.columns.map(col=>cell(r,col)).join('');
      return `<tr>${tds}<td><div class="row-actions">
        <button class="icon-btn" title="Bearbeiten" onclick="openEdit('${section}','${r.id}')">${penIcon()}</button>
        <button class="icon-btn del" title="Löschen" onclick="removeRow('${section}','${r.id}')">${trashIcon()}</button>
      </div></td></tr>`;
    }).join('');
  }
  return `
  <div class="sec-head">
    <div class="desc">Verwalte hier die Inhalte für <b>${sec.label}</b> auf der Website.</div>
    <button class="btn" onclick="openCreate('${section}')">＋ Neu</button>
  </div>
  <div class="tbl-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${body}</tbody></table></div>`;
}

function cell(r,col){
  const v=r[col.key]!==undefined?r[col.key]:'';
  if(col.type==='title'){
    const th=col.thumbKey==='initials'?(r.initials||'—'):(r[col.thumbKey]||'📄');
    const sub=r.excerpt||r.specs||r.description||r.bio||'';
    return `<td><div style="display:flex;align-items:center;gap:14px;"><div class="thumb">${th}</div><div><div class="cell-title">${esc(v)}</div>${sub?`<div class="cell-sub">${esc(clip(sub,46))}</div>`:''}</div></div></td>`;
  }
  if(col.type==='cat') return `<td><span class="pill cat">${esc(v)}</span></td>`;
  if(col.type==='status'){ const on=/veröffentlicht|aktiv/i.test(v); return `<td><span class="pill ${on?'on':'off'}">${esc(v)}</span></td>`; }
  if(col.type==='state'){ let cls='off'; if(/verfügbar/i.test(v))cls='on'; else if(/reserviert/i.test(v))cls='res'; return `<td><span class="pill ${cls}">${esc(v)}</span></td>`; }
  return `<td>${esc(v)}${col.suffix&&v!==''?col.suffix:''}</td>`;
}

/* ============ MODAL / CRUD ============ */
function openCreate(section){ openForm(section,null); }
function openEdit(section,rid){ openForm(section,rid); }
function openForm(section,rid){
  editing={section,id:rid};
  const sec=SECTIONS[section];
  const rec=rid?(DB[section].find(x=>x.id===rid)||{}):{};
  document.getElementById('modalTitle').textContent=(rid?'Bearbeiten · ':'Neu · ')+sec.label;
  let html='';
  const fields=sec.fields;
  for(let i=0;i<fields.length;i++){
    const f=fields[i];
    // pair short fields into 2-col rows
    html+=fieldHtml(f, rec[f.key]);
  }
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('modalBg').classList.add('on');
}
function fieldHtml(f,val){
  val=val===undefined?'':val;
  let input;
  if(f.type==='textarea') input=`<textarea data-k="${f.key}" placeholder="${f.ph||''}">${esc(val)}</textarea>`;
  else if(f.type==='select') input=`<select data-k="${f.key}">${f.options.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select>`;
  else if(f.type==='number') input=`<input data-k="${f.key}" type="number" value="${esc(val)}" placeholder="${f.ph||''}">`;
  else input=`<input data-k="${f.key}" type="text" value="${esc(val)}" placeholder="${f.ph||''}">`;
  return `<div class="field"><label>${f.label}</label>${input}</div>`;
}
function saveModal(){
  const {section,id:rid}=editing;
  const rec={};
  document.querySelectorAll('#modalBody [data-k]').forEach(el=>{ rec[el.dataset.k]=el.value.trim(); });
  if(rid){ const i=DB[section].findIndex(x=>x.id===rid); DB[section][i]={...DB[section][i],...rec}; toast('Gespeichert'); }
  else{ rec.id=id(); DB[section].unshift(rec); toast('Erstellt'); }
  persist(); closeModal(); buildSidebar(); setActive(); renderCurrent();
}
function removeRow(section,rid){
  const rec=DB[section].find(x=>x.id===rid);
  const name=rec.title||rec.name||'diesen Eintrag';
  if(!confirm('„'+name+'" wirklich löschen?')) return;
  DB[section]=DB[section].filter(x=>x.id!==rid);
  persist(); buildSidebar(); setActive(); renderCurrent(); toast('Gelöscht');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('on'); editing=null; }
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') closeModal(); });

/* ============ SETTINGS ============ */
function renderSettings(){
  return `
  <div class="demo-banner">⚙️ Demo-Einstellungen — dienen nur zur Veranschaulichung.</div>
  <div class="grid-2">
    <div class="card">
      <h3>Konto</h3>
      <div class="field"><label>Name</label><input type="text" value="Dennis Neumann"></div>

      <div class="field"><label>Rolle</label><input type="text" value="Administrator" disabled></div>
      <button class="btn sm" onclick="toast('Gespeichert (Demo)')">Speichern</button>
    </div>
    <div class="card">
      <h3>Daten</h3>
      <p style="color:var(--muted);font-size:14px;margin-bottom:18px;">Setze alle Inhalte auf die Demo-Ausgangsdaten zurück. Deine lokalen Änderungen gehen dabei verloren.</p>
      <button class="btn danger sm" onclick="resetData()">Auf Demo-Daten zurücksetzen</button>
    </div>
  </div>`;
}
function resetData(){
  if(!confirm('Alle Inhalte auf die Demo-Ausgangsdaten zurücksetzen?')) return;
  DB=seed(); persist(); buildSidebar(); go('dashboard'); toast('Zurückgesetzt');
}

/* ============ HELPERS ============ */
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function clip(s,n){ s=String(s); return s.length>n?s.slice(0,n-1)+'…':s; }
let toastT;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('on'),2200); }

function penIcon(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>'; }
